name: Update Essays Data

on:
  # 每年 12月1日 和 6月1日 UTC 00:00 (台灣時間 08:00) 自動執行
  # 配合小論文競賽公告時間 (3月、10月公告)
  schedule:
    - cron: '0 0 1 12 *'  # 12月1日
    - cron: '0 0 1 5 *'   # 5月1日
  
  # 手動觸發
  workflow_dispatch:
    inputs:
      full_crawl:
        description: '執行完整爬取（約2-3小時）'
        required: false
        default: 'true'
        type: boolean

jobs:
  crawl-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 240  # 4 小時超時
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium
      
      - name: Run crawler
        run: |
          python shs_crawler_full.py --headless --no-resume
        env:
          PYTHONUNBUFFERED: 1
      
      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet essays_data.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add essays_data.json shs_essays_complete.xlsx
          git commit -m "📊 Auto-update essays data - $(date +'%Y-%m-%d')"
          git push
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crawler-results-${{ github.run_id }}
          path: |
            essays_data.json
            shs_essays_complete.xlsx
            crawler.log
          retention-days: 30
      
      - name: Summary
        run: |
          echo "## 🎉 爬蟲執行完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f essays_data.json ]; then
            TOTAL=$(python -c "import json; data=json.load(open('essays_data.json')); print(data['metadata']['total_essays'])")
            echo "- **總文章數**: $TOTAL 篇" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **執行時間**: $(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "- **資料更新**: ${{ steps.check_changes.outputs.changed }}" >> $GITHUB_STEP_SUMMARY
